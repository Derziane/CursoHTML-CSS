<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- ==========================================
         CONFIGURAÇÕES DA PÁGINA
    =========================================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fale Conosco - Pet Shop Cão Feliz</title>

    <!-- Arquivos CSS -->
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">

    <!-- Fonte Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100&display=swap" rel="stylesheet">

</head>

<body>

    <!-- ==========================================
         CABEÇALHO
    =========================================== -->

    <header>

        <div class="box">

            <!-- Logo -->
            <h1>
                <img src="imagens/logo-pet-shop.png"
                     alt="Logo do Pet Shop Cão Feliz"
                     width="150">
            </h1>

            <!-- Menu -->
            <nav>

                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="servicos.html">Serviços</a></li>
                    <li><a href="fale-conosco.html">Fale Conosco</a></li>
                </ul>

            </nav>

        </div>

    </header>

    <!-- ==========================================
         CONTEÚDO PRINCIPAL
    =========================================== -->

    <main>

        <!-- ==========================
             FORMULÁRIO
        =========================== -->

        <form action="#" method="post">

            <!-- Nome -->
            <label for="nome">Nome:</label>

            <input
                type="text"
                id="nome"
                name="nome"
                class="input-text"
                required>

            <!-- E-mail -->
            <label for="email">E-mail:</label>

            <input
                type="email"
                id="email"
                name="email"
                class="input-text"
                required>

            <!-- Celular -->
            <label for="celular">Celular:</label>

            <input
                type="tel"
                id="celular"
                name="celular"
                class="input-text"
                required>

            <!-- Mensagem -->
            <label for="mensagem">Mensagem:</label>

            <textarea
                id="mensagem"
                name="mensagem"
                cols="70"
                rows="10"
                class="input-text"
                required>
            </textarea>

            <!-- Forma de contato -->

            <fieldset>

                <legend>Como podemos entrar em contato?</legend>

                <label for="radio-whatsapp">

                    <input
                        type="radio"
                        id="radio-whatsapp"
                        name="contato"
                        value="WhatsApp"
                        checked>

                    WhatsApp

                </label>

                <label for="radio-celular">

                    <input
                        type="radio"
                        id="radio-celular"
                        name="contato"
                        value="Celular">

                    Celular

                </label>

                <label for="radio-email">

                    <input
                        type="radio"
                        id="radio-email"
                        name="contato"
                        value="E-mail">

                    E-mail

                </label>

            </fieldset>

            <!-- Newsletter -->

            <label class="checkbox">

                <input
                    type="checkbox"
                    id="newsletter"
                    name="newsletter"
                    checked>

                Quero receber e-mails promocionais.

            </label>

            <!-- Botão -->

            <input
                type="submit"
                value="Enviar"
                class="enviar">

        </form>

        <!-- ==========================
             TABELA DE HORÁRIOS
        =========================== -->

        <table class="horario">

            <thead>

                <tr>

                    <th class="borda">Dia</th>
                    <th class="borda">Horário</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td class="borda">Segunda a sexta</td>
                    <td class="borda">06h às 20h</td>

                </tr>

                <tr>

                    <td class="borda">Sábado</td>
                    <td class="borda">10h às 18h</td>

                </tr>

                <tr>

                    <td class="borda">Domingo</td>
                    <td class="borda">12h às 18h</td>

                </tr>

            </tbody>

        </table>

    </main>

    <!-- ==========================================
         RODAPÉ
    =========================================== -->

    <footer>

        <img src="imagens/logo-pet-shop.png"
             alt="Logo do Pet Shop Cão Feliz"
             width="100">

        <p>&copy; Copyright 2022 - Pet Shop Cão Feliz</p>

    </footer>

</body>

</html>
